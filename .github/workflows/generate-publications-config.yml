name: Generate publications config

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate config
        run: node scripts/generate-publications-config.js

      - name: Commit changes
        run: |
          if [[ -n "$(git status --porcelain publications/config.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add publications/config.json
            git commit -m "chore: update publications config"
            git push
          else
            echo "No changes to commit."
          fi
