<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Publication | Amir Mehrpanah</title>
    <meta name="description" content="Publication details." />
    <meta name="robots" content="noindex,nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Source+Serif+4:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../assets/css/site.css" />
  </head>
  <body>
    <header class="site-header" data-site-header data-base="../../" data-active="publications"></header>

    <main data-collection-detail data-collection-type="publication" data-collection-path="publications"
      data-param="paper" data-base="../../">
      <div class="container">
        <section class="section">
          <div class="section-title">
            <span>Publication</span>
            <span class="tag" data-publication-tag></span>
          </div>
          <article class="card post-content">
            <h1 class="post-title" data-publication-title></h1>
            <p class="publication-authors" data-publication-authors></p>
            <img src="" alt="" data-publication-hero />
            
            <p data-publication-abstract></p>
            <p class="publication-actions">
              <a class="button button-icon" href="" target="_blank" rel="noopener noreferrer" aria-label="Open PDF" title="Open PDF" data-publication-pdf>
                <i class="fa-solid fa-file-pdf" aria-hidden="true"></i>
              </a>
              <a class="button button-icon" href="" target="_blank" rel="noopener noreferrer" aria-label="Open YouTube video" title="Open YouTube video" data-publication-video>
                <i class="fa-brands fa-youtube" aria-hidden="true"></i>
              </a>
            </p>
            <p class="post-meta" data-publication-error style="display: none;"></p>
          </article>
        </section>
      </div>
    </main>

    <footer data-site-footer></footer>

    <script src="../../assets/js/layout.js"></script>
    <script src="../../assets/js/collection-detail.js"></script>
    <script src="../../assets/js/theme.js"></script>
  </body>
</html>
