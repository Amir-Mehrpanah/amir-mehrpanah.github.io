<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blog | Amir Mehrpanah</title>
    <meta name="description" content="Research updates, announcements, and notes." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Source+Serif+4:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/site.css" />
  </head>
  <body>
    <header class="site-header" data-site-header data-base="../" data-active="blog"></header>

    <main>
      <div class="container">
        <section class="section">
          <div class="section-title">
            <span>Blog</span>
            <span class="tag">Announcements & Notes</span>
          </div>
          <div class="post-list" data-posts data-source="../assets/data/posts.json" data-base="../">
            <div class="post-meta">Update assets/data/posts.json to populate.</div>
          </div>
        </section>
      </div>
    </main>

    <footer data-site-footer></footer>

    <script src="../assets/js/layout.js"></script>
    <script src="../assets/js/posts.js"></script>
    <script src="../assets/js/theme.js"></script>
  </body>
</html>
