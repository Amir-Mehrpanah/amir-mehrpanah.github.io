<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blog Post | Amir Mehrpanah</title>
    <meta name="description" content="Blog post details." />
    <meta name="robots" content="noindex,nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Source+Serif+4:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/site.css" />
  </head>
  <body>
    <header class="site-header" data-site-header data-base="../" data-active="blog"></header>

    <main data-collection-detail data-collection-type="post" data-collection-path="blog"
      data-param="post" data-base="../">
      <div class="container">
        <section class="section">
          <div class="section-title">
            <span data-post-category>Blog</span>
            <span class="tag" data-post-date></span>
          </div>
          <article class="card post-content">
            <h1 class="post-title" data-post-title>Blog Post</h1>
            <img
              class="post-hero"
              src="../assets/images/post-hero-placeholder.svg"
              alt=""
              data-post-hero
            />
            <p data-post-lead></p>
            <p data-post-body></p>
            <p class="post-meta" data-post-error style="display: none;"></p>
          </article>
        </section>
      </div>
    </main>

    <footer data-site-footer></footer>

    <script src="../assets/js/layout.js"></script>
    <script src="../assets/js/collection-detail.js"></script>
    <script src="../assets/js/theme.js"></script>
  </body>
</html>
